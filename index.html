<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FF6B6B">
<link rel="apple-touch-icon" href="https://pfst.cf2.poecdn.net/base/image/651b4ca648074e1807687e5412abe8d3e876ae62220df968c6a18c6c7d1ece04?w=1024&h=1024">
<link rel="icon" type="image/png" href="https://pfst.cf2.poecdn.net/base/image/651b4ca648074e1807687e5412abe8d3e876ae62220df968c6a18c6c7d1ece04?w=1024&h=1024">
<title>酒店投訴處理系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#FF6B6B;--primary-dark:#e85d5d;--primary-light:#ffe0e0;
  --secondary:#4ECDC4;--secondary-dark:#3dbdb5;--secondary-light:#d4f5f2;
  --accent:#FFE66D;--accent-dark:#f5d94e;
  --bg:#FFF9F0;--surface:#FFFFFF;
  --text:#2C3E50;--text-light:#7F8C8D;--text-lighter:#BDC3C7;
  --border:#F0EDE8;--shadow:0 2px 12px rgba(0,0,0,0.08);
  --radius:16px;--radius-sm:10px;
  --nav-h:85px;--header-h:56px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:16px}
#app{height:100%;display:flex;flex-direction:column}

/* HEADER */
.header{background:linear-gradient(135deg,#FF6B6B 0%,#feca57 100%);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;min-height:var(--header-h);flex-shrink:0;position:relative;z-index:10}
.header h1{color:#fff;font-size:18px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.1)}
.header-btn{background:rgba(255,255,255,0.25);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.header-btn:active{background:rgba(255,255,255,0.4)}

/* MAIN CONTENT */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:8px}

/* PAGES */
.page{display:none;padding:16px;animation:fadeIn .25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardEnter{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes gentlePulse{0%,100%{box-shadow:0 2px 12px rgba(255,107,107,0.15)}50%{box-shadow:0 4px 24px rgba(255,107,107,0.3)}}
@keyframes navBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* BOTTOM NAV */
.nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:8px 0 env(safe-area-inset-bottom,10px);flex-shrink:0;position:relative;z-index:10;min-height:var(--nav-h)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;cursor:pointer;transition:color .2s;color:var(--text-light);border:none;background:none;font-family:inherit}
.nav-item.active{color:var(--primary)}
.nav-item.active .nav-icon{animation:navBounce .4s ease}
.nav-item .nav-icon{font-size:28px;line-height:1}
.nav-item .nav-label{font-size:13px;font-weight:600}

/* GLOBAL SEARCH */
.global-search{background:linear-gradient(135deg,#e85d5d 0%,#f0c040 100%);padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;flex-shrink:0}
.global-search.open{max-height:70px;padding:10px 16px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px}
.search-input{width:100%;padding:14px 16px 14px 44px;border:2px solid var(--border);border-radius:var(--radius);font-size:16px;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--secondary)}
.search-input::placeholder{color:var(--text-lighter)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-lighter);pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--text-lighter);color:#fff;border:none;width:22px;height:22px;border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.search-clear.show{display:flex}

/* CORE MINDSET CARD */
.core-mindset-card{background:linear-gradient(135deg,#fff5f5,#fff9e6);border-radius:var(--radius);padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(255,107,107,0.15);cursor:pointer;border:2px solid #ffe0e0;transition:transform .15s;animation:gentlePulse 4s ease-in-out infinite}
.core-mindset-card:active{transform:scale(0.98)}
.core-mindset-icon{font-size:36px;flex-shrink:0}
.core-mindset-body{flex:1;min-width:0}
.core-mindset-label{font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.core-mindset-text{font-size:14px;line-height:1.6;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.core-mindset-arrow{font-size:22px;color:var(--text-lighter);flex-shrink:0}

/* SCENARIO GRID */
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.scenario-card{background:var(--surface);border-radius:var(--radius);padding:20px 14px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid transparent;position:relative;overflow:hidden;animation:cardEnter .4s ease both}
.scenario-card:nth-child(1){animation-delay:.05s}
.scenario-card:nth-child(2){animation-delay:.1s}
.scenario-card:nth-child(3){animation-delay:.15s}
.scenario-card:nth-child(4){animation-delay:.2s}
.scenario-card:nth-child(5){animation-delay:.25s}
.scenario-card:nth-child(6){animation-delay:.3s}
.scenario-card:active{transform:scale(0.97)}
.scenario-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.scenario-card .card-icon{font-size:40px;margin-bottom:8px;display:block}
.scenario-card .card-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.scenario-card .card-subtitle{font-size:13px;color:var(--text-light);line-height:1.4}

/* Scenario card colors */
.scenario-card[data-id="hygiene"]::before{background:#10b981}.scenario-card[data-id="hygiene"]{border-color:#d1fae5}
.scenario-card[data-id="equipment"]::before{background:#3b82f6}.scenario-card[data-id="equipment"]{border-color:#dbeafe}
.scenario-card[data-id="noise"]::before{background:#f59e0b}.scenario-card[data-id="noise"]{border-color:#fef3c7}
.scenario-card[data-id="injury"]::before{background:#ef4444}.scenario-card[data-id="injury"]{border-color:#fee2e2}
.scenario-card[data-id="emotional"]::before{background:#8b5cf6}.scenario-card[data-id="emotional"]{border-color:#ede9fe}
.scenario-card[data-id="fraud"]::before{background:#ec4899}.scenario-card[data-id="fraud"]{border-color:#fce7f3}

/* SEARCH RESULTS */
.search-results{display:none}
.search-results.show{display:block}
.search-result-item{background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.search-result-item:active{transform:scale(0.98)}
.search-result-item .result-tag{display:inline-block;font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:6px;font-weight:600}
.search-result-item .result-text{font-size:15px;line-height:1.6}
.search-result-item mark{background:var(--accent);color:var(--text);padding:0 2px;border-radius:2px}
.search-no-result{text-align:center;padding:40px 20px;color:var(--text-light)}
.search-no-result .no-result-icon{font-size:48px;margin-bottom:12px;display:block}

/* SCENARIO DETAIL OVERLAY */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
.detail-overlay.open{display:flex;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-header{padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;color:#fff}
.detail-header .back-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-header .back-btn:active{background:rgba(255,255,255,0.35)}
.detail-header h2{font-size:18px;font-weight:700}
.detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding:12px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom))}

/* ACCORDION */
.accordion{margin-bottom:10px;animation:cardEnter .35s ease both}
.detail-body .accordion:nth-child(1){animation-delay:.05s}
.detail-body .accordion:nth-child(2){animation-delay:.1s}
.detail-body .accordion:nth-child(3){animation-delay:.15s}
.detail-body .accordion:nth-child(4){animation-delay:.2s}
.detail-body .accordion:nth-child(5){animation-delay:.25s}
.detail-body .accordion:nth-child(6){animation-delay:.3s}
.detail-body .accordion:nth-child(7){animation-delay:.35s}
.detail-body .accordion:nth-child(8){animation-delay:.4s}
.detail-body .accordion:nth-child(9){animation-delay:.45s}
.accordion-trigger{width:100%;background:var(--surface);border:none;padding:16px 16px;display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;color:var(--text);cursor:pointer;border-radius:var(--radius-sm);box-shadow:0 1px 4px rgba(0,0,0,0.05);transition:background .15s;font-family:inherit;text-align:left}
.accordion-trigger:active{background:#f8f8f8}
.accordion-trigger .acc-icon{font-size:18px;flex-shrink:0}
.accordion-trigger .acc-arrow{margin-left:auto;font-size:12px;color:var(--text-lighter);transition:transform .25s;flex-shrink:0}
.accordion.open .acc-arrow{transform:rotate(90deg)}
.accordion-content{max-height:0;overflow:hidden;transition:max-height .3s ease}
.accordion.open .accordion-content{max-height:2000px}
.accordion-inner{padding:12px 16px;background:var(--surface);border-radius:0 0 var(--radius-sm) var(--radius-sm);margin-top:-4px}
.accordion-inner p,.accordion-inner li{font-size:15px;line-height:1.8;color:#444}
.accordion-inner ul{list-style:none;padding:0}
.accordion-inner li{padding:4px 0;padding-left:0}
.accordion-inner li::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:8px;vertical-align:middle}
.accordion-inner .action-list li::before{background:var(--secondary)}
.accordion-inner .script-list li{position:relative;padding:8px 12px;background:#f8fffe;border-left:3px solid var(--secondary);border-radius:0 6px 6px 0;margin:6px 0}
.accordion-inner .script-list li::before{display:none}
.accordion-inner .dont-list li{color:#c0392b}
.accordion-inner .dont-list li::before{background:#e74c3c}
.accordion-inner .followup-list li::before{background:#f39c12}
.copy-btn{background:none;border:1px solid var(--border);color:var(--text-light);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;display:inline-block;margin-top:6px}
.copy-btn:active{background:var(--secondary-light);color:var(--secondary-dark);border-color:var(--secondary)}

/* MINDSET PAGE */
.mindset-card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--primary)}
.mindset-card h3{font-size:17px;color:var(--primary-dark);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mindset-card p{font-size:15px;line-height:1.8;color:#444}
.mindset-card .highlight{background:var(--accent);padding:2px 6px;border-radius:4px;font-weight:600}
.mindset-hero{background:linear-gradient(135deg,#FF6B6B,#feca57);border-radius:var(--radius);padding:24px 20px;margin-bottom:16px;text-align:center;color:#fff;box-shadow:0 4px 20px rgba(255,107,107,0.3);animation:cardEnter .5s ease both}
.mindset-hero .hero-quote{font-size:20px;font-weight:700;margin-bottom:6px}
.mindset-hero .hero-sub{font-size:13px;opacity:0.9}

/* CHECKLIST PAGE */
.checklist-progress{background:var(--surface);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow);text-align:center}
.checklist-progress .progress-text{font-size:15px;color:var(--text-light);margin-bottom:8px}
.checklist-progress .progress-text span{color:var(--secondary);font-weight:700;font-size:20px}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--secondary),#7ddfda);border-radius:4px;transition:width .3s ease;width:0}
.checklist-item{background:var(--surface);border-radius:var(--radius-sm);padding:16px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,0.05);cursor:pointer;transition:transform .15s,background .2s;-webkit-user-select:none;user-select:none;animation:cardEnter .35s ease both}
.checklist-item:nth-child(2){animation-delay:.03s}
.checklist-item:nth-child(3){animation-delay:.06s}
.checklist-item:nth-child(4){animation-delay:.09s}
.checklist-item:nth-child(5){animation-delay:.12s}
.checklist-item:nth-child(6){animation-delay:.15s}
.checklist-item:nth-child(7){animation-delay:.18s}
.checklist-item:nth-child(8){animation-delay:.21s}
.checklist-item:nth-child(9){animation-delay:.24s}
.checklist-item:active{transform:scale(0.98)}
.checklist-item.checked{background:#f0fdf4}
.checklist-item .check-box{width:28px;height:28px;border:2px solid var(--border);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;margin-top:2px}
.checklist-item.checked .check-box{background:var(--secondary);border-color:var(--secondary);color:#fff}
.checklist-item .check-step{font-size:13px;color:var(--text-lighter);font-weight:600;margin-bottom:2px}
.checklist-item .check-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px}
.checklist-item .check-desc{font-size:14px;color:var(--text-light);line-height:1.5}
.checklist-item.checked .check-title{text-decoration:line-through;color:var(--text-light)}
.reset-btn{display:block;margin:16px auto;background:none;border:1px solid var(--text-lighter);color:var(--text-light);padding:12px 30px;border-radius:var(--radius);font-size:15px;cursor:pointer;transition:all .2s}
.reset-btn:active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

/* MORE PAGE */
.more-card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:14px;transition:transform .2s;animation:cardEnter .4s ease both}
.more-card:nth-child(1){animation-delay:.05s}
.more-card:nth-child(2){animation-delay:.1s}
.more-card:nth-child(3){animation-delay:.15s}
.more-card:nth-child(4){animation-delay:.2s}
.more-card:active{transform:scale(0.98)}
.more-card .more-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.more-card .more-info h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px}
.more-card .more-info p{font-size:13px;color:var(--text-light)}
.more-card .more-arrow{margin-left:auto;color:var(--text-lighter);font-size:18px}

/* SUB PAGE (for More items) */
.sub-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
.sub-overlay.open{display:flex;animation:slideUp .3s ease}
.sub-header{background:linear-gradient(135deg,#FF6B6B,#feca57);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;color:#fff}
.sub-header .back-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sub-header h2{font-size:18px;font-weight:700}
.sub-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

/* Sub page content */
.info-section{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.info-section h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.info-section p,.info-section li{font-size:15px;line-height:1.8;color:#444}
.info-section ul{list-style:none;padding:0}
.info-section li{padding:3px 0}

/* Record form */
.record-form{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px}
.form-row{display:flex;border-bottom:1px solid var(--border)}
.form-row:last-child{border-bottom:none}
.form-label{width:110px;flex-shrink:0;padding:12px;font-size:14px;font-weight:600;color:var(--primary-dark);background:#fff5f5}
.form-value{flex:1;padding:12px;font-size:14px;color:var(--text-light)}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.8);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SECTION TITLE */
.section-title{font-size:14px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;padding-left:4px}
.section-title:first-child{margin-top:0}

/* SELFCARE */
.selfcare-card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.selfcare-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
.selfcare-card h3 .state-num{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;align-items:center;justify-content:center;margin-right:6px}
.selfcare-card .state-trigger{font-weight:600;color:var(--primary-dark);margin-bottom:4px;font-size:15px}
.selfcare-card p{font-size:15px;line-height:1.8;color:#444}
.selfcare-tip{background:linear-gradient(135deg,#d4f5f2,#e0f7fa);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.selfcare-tip h3{font-size:16px;font-weight:700;color:var(--secondary-dark);margin-bottom:8px}
.selfcare-tip p,.selfcare-tip li{font-size:15px;line-height:1.8;color:#444}

/* BREATHING TIMER */
.breath-widget{text-align:center;padding:20px 0 10px}
.breath-start-btn{background:linear-gradient(135deg,var(--secondary),#7ddfda);color:#fff;border:none;padding:14px 32px;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(78,205,196,0.3);transition:transform .15s,opacity .15s}
.breath-start-btn:active{transform:scale(0.95)}
.breath-circle-wrap{display:none;flex-direction:column;align-items:center;gap:14px}
.breath-circle-wrap.active{display:flex}
.breath-circle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--secondary-light),#e0f7fa);border:4px solid var(--secondary);display:flex;align-items:center;justify-content:center;transition:transform 4s ease-in-out,border-color .5s;position:relative}
.breath-circle.inhale{transform:scale(1.35);border-color:var(--secondary)}
.breath-circle.hold{transform:scale(1.35);border-color:var(--accent-dark)}
.breath-circle.exhale{transform:scale(1);border-color:var(--primary);transition:transform 6s ease-in-out,border-color .5s}
.breath-label{font-size:18px;font-weight:700;color:var(--secondary-dark)}
.breath-phase{font-size:15px;color:var(--text-light);font-weight:600}
.breath-count{font-size:13px;color:var(--text-lighter)}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--text-lighter);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px"><img src="https://pfst.cf2.poecdn.net/base/image/651b4ca648074e1807687e5412abe8d3e876ae62220df968c6a18c6c7d1ece04?w=1024&h=1024" style="width:34px;height:34px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.15)"><h1>投訴處理系統</h1></div>
    <button class="header-btn" onclick="toggleGlobalSearch()" id="searchToggle">🔍</button>
  </div>
  <!-- GLOBAL SEARCH BAR -->
  <div class="global-search" id="globalSearch">
    <div class="search-wrap" style="margin:0">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋關鍵字（如「血跡」「滑倒」「換房」）" oninput="handleSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="mainContent">
    <!-- HOME PAGE -->

let _prevPage='home';
function switchPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const navBtn=document.querySelector(`.nav-item[data-page="${name}"]`);
  if(navBtn)navBtn.classList.add('active');
  document.getElementById('mainContent').scrollTop=0;
  if(name!=='search')_prevPage=name;
}

// ============================================================
// GLOBAL SEARCH
// ============================================================
function toggleGlobalSearch(){
  const bar=document.getElementById('globalSearch');
  const input=document.getElementById('searchInput');
  if(bar.classList.contains('open')){
    bar.classList.remove('open');
    if(document.getElementById('page-search').classList.contains('active')){
      clearSearch();
      switchPage(_prevPage);
    }
  }else{
    bar.classList.add('open');
    setTimeout(()=>input.focus(),200);
  }
}

function handleSearch(query){
  const clearBtn=document.getElementById('searchClear');
  const results=document.getElementById('searchResults');

  if(!query.trim()){
    clearBtn.classList.remove('show');
    // Return to previous page
    if(document.getElementById('page-search').classList.contains('active')){
      switchPage(_prevPage);
    }
    return;
  }
  clearBtn.classList.add('show');
  // Switch to search results page
  switchPage('search');

  const q=query.toLowerCase();
  let html='';

  // Search scenarios
  SCENARIOS.forEach(s=>{
    const allText=[s.title,s.subtitle,...s.situations,...s.mindset,...s.selfTalk,...s.actions,...s.scripts,...s.followUp,...s.donts,...(s.redFlags||[])].join(' ');
    if(allText.toLowerCase().includes(q)){
      const matches=[];
      [...s.situations,...s.actions,...s.scripts,...s.donts,...(s.redFlags||[])].forEach(t=>{
        if(t.toLowerCase().includes(q))matches.push(t);
      });
      const preview=matches.length>0?matches.slice(0,2).map(m=>highlightText(m,q)).join('<br>'):'點擊查看詳情';
      html+=`<div class="search-result-item" onclick="openDetail('${s.id}')">
        <span class="result-tag" style="background:${s.colorLight};color:${s.color}">${s.icon} ${s.title}</span>
        <div class="result-text">${preview}</div>
      </div>`;
    }
  });

  // Search mindsets
  MINDSETS.forEach((m,i)=>{
    if((m.title+m.text).toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="switchPage('mindset');setTimeout(()=>{const el=document.querySelectorAll('#page-mindset .accordion')[${i}];if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.classList.add('open')}},100)">
        <span class="result-tag" style="background:var(--primary-light);color:var(--primary)">${m.icon} 心法</span>
        <div class="result-text">${highlightText(m.title,q)}</div>
      </div>`;
    }
  });

  // Search special guests
  SPECIAL_GUESTS.forEach(g=>{
    const allText=[g.title,...g.items].join(' ');
    if(allText.toLowerCase().includes(q)){
      const match=g.items.find(i=>i.toLowerCase().includes(q));
      html+=`<div class="search-result-item" onclick="openSub('guests')">
        <span class="result-tag" style="background:#d1fae5;color:#059669">👥 特殊客群</span>
        <div class="result-text">${highlightText(g.icon+' '+g.title+(match?' — '+match:''),q)}</div>
      </div>`;
    }
  });

  // Search legal
  LEGAL.forEach(l=>{
    const allText=[l.title,...l.items].join(' ');
    if(allText.toLowerCase().includes(q)){
      const match=l.items.find(i=>i.toLowerCase().includes(q));
      html+=`<div class="search-result-item" onclick="openSub('legal')">
        <span class="result-tag" style="background:#fef3c7;color:#d97706">⚖️ 法律提醒</span>
        <div class="result-text">${highlightText(l.icon+' '+l.title+(match?' — '+match:''),q)}</div>
      </div>`;
    }
  });

  // Search self-care
  const selfcareText=JSON.stringify(SELFCARE).toLowerCase();
  if(selfcareText.includes(q)){
    html+=`<div class="search-result-item" onclick="openSub('selfcare')">
      <span class="result-tag" style="background:#ede9fe;color:#7c3aed">💆 自我照顧</span>
      <div class="result-text">點擊查看自我照顧提醒</div>
    </div>`;
  }

  // Search checklist
  CHECKLIST.forEach(c=>{
    if((c.title+c.desc).toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="switchPage('checklist')">
        <span class="result-tag" style="background:var(--secondary-light);color:var(--secondary-dark)">✅ 標準流程</span>
        <div class="result-text">${highlightText('步驟'+c.step+'：'+c.title+' — '+c.desc,q)}</div>
      </div>`;
    }
  });

  if(!html){
    html=`<div class="search-no-result"><span class="no-result-icon">🔍</span>找不到「${escapeHtml(query)}」相關內容<br><small>試試其他關鍵字</small></div>`;
  }
  results.innerHTML=html;
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('searchResults').innerHTML='';
  if(document.getElementById('page-search').classList.contains('active')){
    switchPage(_prevPage);
  }
}
function closeGlobalSearch(){
  document.getElementById('globalSearch').classList.remove('open');
  clearSearch();
}

function highlightText(text,query){
  const regex=new RegExp(`(${escapeRegex(query)})`,'gi');
  return escapeHtml(text).replace(regex,'<mark>$1</mark>');
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

// ============================================================
function openDetail(id){
  const s=SCENARIOS.find(x=>x.id===id);
  if(!s)return;
  const overlay=document.getElementById('detailOverlay');
  const header=document.getElementById('detailHeader');
  const body=document.getElementById('detailBody');

  header.style.background=s.color;
  document.getElementById('detailTitle').textContent=s.icon+' '+s.title;

  // Priority order: action-first, then reference
  let sections=[
    {icon:'⚡',label:'即時行動',cls:'action-list',items:s.actions,open:true},
    {icon:'🎙',label:'溝通話術',cls:'script-list',items:s.scripts,open:true,copyable:true},
    {icon:'🚫',label:'禁忌事項',cls:'dont-list',items:s.donts},
  ];
  // Divider label
  sections.push({icon:'',label:'───── 延伸參考 ─────',cls:'',items:[],divider:true});
  sections.push({icon:'📌',label:'常見情境',cls:'',items:s.situations});
  if(s.redFlags){
    sections.push({icon:'🚩',label:'識別紅旗',cls:'dont-list',items:s.redFlags});
  }
  sections.push(
    {icon:'🧘',label:'心法口訣',cls:'',items:s.mindset},
    {icon:'🗣',label:'自我對話',cls:'',items:s.selfTalk},
    {icon:'📋',label:'後續跟進',cls:'followup-list',items:s.followUp}
  );

  body.innerHTML=sections.map(sec=>{
    if(sec.divider) return `<div style="text-align:center;color:var(--text-lighter);font-size:13px;padding:8px 0;letter-spacing:2px">${sec.label}</div>`;
    return `
    <div class="accordion${sec.open?' open':''}">
      <button class="accordion-trigger" onclick="toggleAccordion(this)">
        <span class="acc-icon">${sec.icon}</span>
        ${sec.label}
        <span class="acc-arrow">▶</span>
      </button>
      <div class="accordion-content">
        <div class="accordion-inner">
          <ul class="${sec.cls}">
            ${sec.items.map((item,i)=>{
              const num=sec.cls==='action-list'?`<strong>${i+1}.</strong> `:'';
              const copyBtn=sec.copyable?`<br><button class="copy-btn" onclick="event.stopPropagation();copyText(\`${item.replace(/`/g,"'").replace(/\\/g,'\\\\')}\`)">📋 複製此話術</button>`:'';
              return `<li>${num}${escapeHtml(item)}${copyBtn}</li>`;
            }).join('')}
          </ul>
        </div>
      </div>

  }).join('')
  // Add shortcut buttons at bottom

    </div>`;

  body.scrollTop=0;
}

// ============================================================
// CHECKLIST STATE
// ============================================================
function getCheckedItems(){
  try{return JSON.parse(localStorage.getItem('checklist_checked')||'[]')}catch(e){return[]}
}
function saveCheckedItems(arr){
  localStorage.setItem('checklist_checked',JSON.stringify(arr));
}
function toggleCheck(step){
  let checked=getCheckedItems();
  if(checked.includes(step)){checked=checked.filter(s=>s!==step)}else{checked.push(step)}
  saveCheckedItems(checked);
  renderChecklist();
}
function resetChecklist(){
  // Show custom confirm dialog (no native alert/confirm in some contexts)
  const existing=document.getElementById('resetConfirm');
  if(existing){existing.remove();return}
  const div=document.createElement('div');
  div.id='resetConfirm';
  div.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease';
  div.innerHTML=`<div style="background:#fff;border-radius:16px;padding:24px;margin:20px;text-align:center;max-width:300px;box-shadow:0 8px 30px rgba(0,0,0,0.2)">
    <div style="font-size:32px;margin-bottom:8px">↺</div>
    <div style="font-size:16px;font-weight:600;margin-bottom:6px">確定要重置流程？</div>
    <div style="font-size:13px;color:#7F8C8D;margin-bottom:18px">所有打勾進度將會清空</div>
    <div style="display:flex;gap:10px">
      <button onclick="document.getElementById('resetConfirm').remove()" style="flex:1;padding:12px;border-radius:10px;border:1px solid #e0e0e0;background:#fff;color:#666;font-size:14px;cursor:pointer;font-family:inherit">取消</button>
      <button onclick="doReset()" style="flex:1;padding:12px;border-radius:10px;border:none;background:#FF6B6B;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">確定重置</button>
    </div>
  </div>`;
  document.body.appendChild(div);
}
function doReset(){
  document.getElementById('resetConfirm').remove();
  saveCheckedItems([]);
  renderChecklist();
  showToast('流程已重置 ✓');
}

// ============================================================
// BREATHING TIMER (4-4-6 method)
// ============================================================
let _breathTimer=null;
function startBreathing(){
  const btn=document.getElementById('breathStartBtn');
  const wrap=document.getElementById('breathCircle');
  const ball=document.getElementById('breathBall');
  const label=document.getElementById('breathLabel');
  const phase=document.getElementById('breathPhase');
  const countEl=document.getElementById('breathCount');
  btn.style.display='none';
  wrap.classList.add('active');

  const cycles=3;
  let currentCycle=0;

  function runCycle(){
    if(currentCycle>=cycles){
      label.textContent='✓';
      phase.textContent='準備好了';
      countEl.textContent='';
      ball.className='breath-circle';
      setTimeout(()=>{
        wrap.classList.remove('active');
        btn.style.display='';
        btn.textContent='🫁 再來一次';
      },2000);
      return;
    }
    countEl.textContent=`第 ${currentCycle+1} / ${cycles} 次`;

    // Inhale 4s
    ball.className='breath-circle inhale';
    label.textContent='吸氣';
    phase.textContent='慢慢吸氣... 4秒';
    let sec=4;
    clearInterval(_breathTimer);
    _breathTimer=setInterval(()=>{
      sec--;
      if(sec>0) phase.textContent=`慢慢吸氣... ${sec}秒`;
    },1000);

    setTimeout(()=>{
      clearInterval(_breathTimer);
      // Hold 4s
      ball.className='breath-circle hold';
      label.textContent='屏住';
      phase.textContent='屏住呼吸... 4秒';
      sec=4;
      _breathTimer=setInterval(()=>{
        sec--;
        if(sec>0) phase.textContent=`屏住呼吸... ${sec}秒`;
      },1000);

      setTimeout(()=>{
        clearInterval(_breathTimer);
        // Exhale 6s
        ball.className='breath-circle exhale';
        label.textContent='呼氣';
        phase.textContent='慢慢呼氣... 6秒';
        sec=6;
        _breathTimer=setInterval(()=>{
          sec--;
          if(sec>0) phase.textContent=`慢慢呼氣... ${sec}秒`;
        },1000);

        setTimeout(()=>{
          clearInterval(_breathTimer);
          currentCycle++;
          runCycle();
        },6000);
      },4000);
    },4000);
  }
  runCycle();
}

// ============================================================
// UTILITIES
// ============================================================
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>showToast('已複製到剪貼板 📋')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已複製到剪貼板 📋');
  });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// Back button handling
window.addEventListener('popstate',()=>{
  if(document.getElementById('subOverlay').classList.contains('open')){closeSub();return}
  if(document.getElementById('detailOverlay').classList.contains('open')){closeDetail();return}
});

// Push state when opening overlays
const origOpenDetail=openDetail;
openDetail=function(id){history.pushState({detail:id},'');origOpenDetail(id)};
const origOpenSub=openSub;
openSub=function(type){history.pushState({sub:type},'');origOpenSub(type)};
